name: Nitter
options:
  bundleIdPrefix: local.nitter
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: 2.7.0

targets:
  Nitter:
    type: application
    platform: iOS
    sources:
      - path: Nitter
      - path: Shared
    info:
      path: Nitter/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: local.xcancel.XCancel
            CFBundleURLSchemes:
              - nitter
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - package: SwiftSoup
      - target: NitterShareExtension
    settings:
      base:
        # Preserve the shipped identifier so Nitter upgrades the existing app in place.
        PRODUCT_BUNDLE_IDENTIFIER: local.xcancel.XCancel
        DEVELOPMENT_TEAM: DW35S36K2Z
        CODE_SIGN_ENTITLEMENTS: Nitter/Nitter.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"

  NitterShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: NitterShareExtension
      - path: Shared
    info:
      path: NitterShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Open in Nitter
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.xcancel.XCancel.ShareExtension
        DEVELOPMENT_TEAM: DW35S36K2Z
        CODE_SIGN_ENTITLEMENTS: NitterShareExtension/NitterShareExtension.entitlements
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.0"

  NitterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NitterTests
    dependencies:
      - target: Nitter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.nitter.NitterTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"

schemes:
  Nitter:
    build:
      targets:
        Nitter: all
    test:
      targets:
        - name: NitterTests
          parallelizable: true
          randomExecutionOrder: true
