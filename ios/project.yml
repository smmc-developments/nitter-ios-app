name: Nitter
options:
  bundleIdPrefix: local.nitter
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: 2.7.0

targets:
  Nitter:
    type: application
    platform: iOS
    sources:
      - path: Nitter
    info:
      path: Nitter/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        # Preserve the shipped identifier so Nitter upgrades the existing app in place.
        PRODUCT_BUNDLE_IDENTIFIER: local.xcancel.XCancel
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"

  NitterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NitterTests
    dependencies:
      - target: Nitter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.nitter.NitterTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"

schemes:
  Nitter:
    build:
      targets:
        Nitter: all
    test:
      targets:
        - name: NitterTests
          parallelizable: true
          randomExecutionOrder: true
