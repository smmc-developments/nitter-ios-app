services:
  nitter:
    build: .
    ports:
      - "3000:3000"
    environment:
      FETCH_MINUTES: ${FETCH_MINUTES:-15}
      API_KEY: ${API_KEY:-}
      PROXY_SECRET: ${PROXY_SECRET:-}
      ALLOW_INSECURE_NO_AUTH: ${ALLOW_INSECURE_NO_AUTH:-false}
      MAX_ACCOUNTS_PER_CYCLE: ${MAX_ACCOUNTS_PER_CYCLE:-40}
      FETCH_CONCURRENCY: ${FETCH_CONCURRENCY:-2}
      FETCH_START_INTERVAL_MS: ${FETCH_START_INTERVAL_MS:-1000}
      MAX_PAGES_PER_ACCOUNT: ${MAX_PAGES_PER_ACCOUNT:-5}
      INCLUDE_REPLIES: ${INCLUDE_REPLIES:-true}
      MAX_PARENT_ENRICHMENTS: ${MAX_PARENT_ENRICHMENTS:-20}
    volumes:
      - nitter-data:/app/data
    restart: unless-stopped

volumes:
  nitter-data:
    # Preserve the volume created by the original development Compose project.
    name: server_xcancel-data
