name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build --tag nitter-ios-app:ci .

  ios:
    name: iOS
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select simulator
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available -j | \
            jq -r '[.devices[][] | select(.name | startswith("iPhone"))][0].udid')
          test -n "$SIMULATOR_ID" && test "$SIMULATOR_ID" != "null"
          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project XCancel.xcodeproj \
            -scheme XCancel \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 7
